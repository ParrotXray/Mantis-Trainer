name: Checker

on:
  pull_request:
    types: [opened, synchronize]
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install black isort flake8

    - name: Run Test Compile
      run: |
        python3 -m compileall .

    - name: Check whether PR is from a fork
      id: fork_check
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ] && \
           [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
          echo "is_fork=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_fork=false" >> "$GITHUB_OUTPUT"
        fi

    # Fork PRs run with a read-only GITHUB_TOKEN (GitHub security restriction),
    # so formatting can only be checked, not auto-fixed and pushed back.
    - name: Format with black (auto-fix)
      if: steps.fork_check.outputs.is_fork == 'false'
      run: black src

    - name: Sort imports with isort (auto-fix)
      if: steps.fork_check.outputs.is_fork == 'false'
      run: isort src

    - name: Check formatting with black (fork PR)
      if: steps.fork_check.outputs.is_fork == 'true'
      run: black --check --diff src

    - name: Check import sorting with isort (fork PR)
      if: steps.fork_check.outputs.is_fork == 'true'
      run: |
        isort --check-only --diff src || {
          echo "::error::Formatting issues found. Since this PR is from a fork, please run 'black src && isort src' locally and push the fix yourself."
          exit 1
        }

    - name: Lint with flake8
      run: |
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Commit and push formatting fixes
      if: steps.fork_check.outputs.is_fork == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No formatting changes to commit"
        else
          git commit -m "style: auto-format with black and isort [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
        fi